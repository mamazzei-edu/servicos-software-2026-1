apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\Users\marco.mazzei\AppData\Local\Microsoft\WinGet\Packages\Kubernetes.kompose_Microsoft.Winget.Source_8wekyb3d8bbwe\kompose.exe convert -f compose.yaml
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: api-visao
  name: api-visao
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: api-visao
  template:
    metadata:
      annotations:
        kompose.cmd: C:\Users\marco.mazzei\AppData\Local\Microsoft\WinGet\Packages\Kubernetes.kompose_Microsoft.Winget.Source_8wekyb3d8bbwe\kompose.exe convert -f compose.yaml
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: api-visao
    spec:
      containers:
        - image: mamazzei/api-visao:v1.0
          name: api-visao
          ports:
            - containerPort: 8081
              protocol: TCP
          readinessProbe:
              httpGet:
                  path: /  # Rota que criamos no FastAPI
                  port: 8081
              initialDelaySeconds: 15 # Espera 15s antes da primeira tentativa (tempo de baixar o modelo)
              periodSeconds: 5        # Tenta a cada 5 segundos
          livenessProbe:
              httpGet:
                path: /
                port: 8081
              initialDelaySeconds: 30 # Dá uma folga maior antes de decidir matar o container
              periodSeconds: 10
      restartPolicy: Always
